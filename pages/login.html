<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Veloura Reserve | Login</title>
    <link rel="icon" type="image/png" href="../assets/brand-logo.png">

    <!-- GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- LUCIDE -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode:'class',
        }
    </script>

    <style>

        *{
            font-family:'Inter',sans-serif;
        }

        .heading-font{
            font-family:'Cormorant Garamond',serif;
        }

        body{
            overflow-x:hidden;
        }

        .glass{
            background:rgba(15,23,42,0.72);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.08);
        }

        .input-style{
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            transition:all .3s ease;
        }

        .input-style:focus{
            border-color:#b45309;
            background:rgba(255,255,255,0.06);
        }

        input{
            outline:none;
        }

    </style>


    <!-- VELOURA UNIFIED NAVBAR & FOOTER -->
    <script src="../src/navbar-footer.js" defer></script>
</head>

<body class="bg-black text-white min-h-screen relative flex items-center justify-center px-6 py-10">

    <!-- BG -->
    <img
        src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2070&auto=format&fit=crop"
        class="absolute inset-0 w-full h-full object-cover"
    >

    <!-- OVERLAY -->
    <div class="absolute inset-0 bg-black/75"></div>

    <!-- LOGIN CARD -->
    <div class="relative z-10 w-full max-w-md glass rounded-[2.5rem] p-8 md:p-10 shadow-2xl">

        <!-- LOGO -->
        <a href="../index.html" class="flex items-center justify-center gap-3 mb-10">

            <img
                src="../assets/brand-logo.png"
                class="w-12 h-12 object-contain"
            >

            <h2 class="heading-font text-4xl font-bold">
                Veloura
            </h2>

        </a>

        <!-- TOP -->
        <div class="text-center mb-10">

            <p class="uppercase tracking-[0.3em] text-xs text-amber-400 mb-4">
                Welcome Back
            </p>

            <h1 class="heading-font text-5xl font-bold mb-4">
                Sign In
            </h1>

            <p class="text-slate-400 leading-relaxed">

                Access your reserve collection,
                memberships, and coffee experiences.

            </p>

        </div>

        <!-- FORM -->
        <form class="space-y-6">

            <!-- EMAIL -->
            <div>

                <label class="block text-sm text-slate-400 mb-3">
                    Email Address
                </label>

                <div class="relative">

                    <i
                        data-lucide="mail"
                        class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"
                    ></i>

                    <input
                        type="email"
                        placeholder="Enter your email"
                        class="input-style w-full h-14 rounded-2xl pl-14 pr-5 placeholder:text-slate-500"
                    >

                </div>

            </div>

            <!-- PASSWORD -->
            <div>

                <div class="flex items-center justify-between mb-3">

                    <label class="text-sm text-slate-400">
                        Password
                    </label>

                    <a
                        href="#"
                        class="text-sm text-amber-400 hover:text-amber-300 transition"
                    >
                        Forgot?
                    </a>

                </div>

                <div class="relative">

                    <i
                        data-lucide="lock"
                        class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"
                    ></i>

                    <input
                        type="password"
                        placeholder="Enter your password"
                        class="input-style w-full h-14 rounded-2xl pl-14 pr-14 placeholder:text-slate-500"
                    >

                    <button
                        type="button"
                        class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-500"
                    >
                        <i data-lucide="eye"></i>
                    </button>

                </div>

            </div>

            <!-- REMEMBER -->
            <label class="flex items-center gap-3 text-sm text-slate-400 cursor-pointer">

                <input
                    type="checkbox"
                    class="accent-amber-700 w-4 h-4"
                >

                Keep me signed in

            </label>

            <!-- BUTTON -->
            <button
                class="w-full h-14 rounded-2xl bg-amber-700 hover:bg-amber-600 transition font-semibold shadow-xl"
            >
                Sign In
            </button>

        </form>

        <!-- DIVIDER -->
        <div class="flex items-center gap-4 my-8">

            <div class="flex-1 h-[1px] bg-white/10"></div>

            <span class="text-xs tracking-[0.2em] text-slate-500 uppercase">
                Or Continue
            </span>

            <div class="flex-1 h-[1px] bg-white/10"></div>

        </div>

        <!-- SOCIAL -->
        <div class="grid grid-cols-2 gap-4">

            <!-- GOOGLE -->
            <button
                class="h-14 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition flex items-center justify-center gap-3 text-sm"
            >

                <img
                    src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
                    class="w-5 h-5 object-contain"
                >

                Google

            </button>

            <!-- APPLE -->
            <button
                class="h-14 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition flex items-center justify-center gap-3 text-sm"
            >

                <i data-lucide="apple"></i>

                Apple

            </button>

        </div>

        <!-- SIGNUP -->
        <div class="mt-8 text-center">

            <p class="text-sm text-slate-400">

                Don’t have an account?

                <a
                    href="./signup.html"
                    class="text-amber-400 hover:text-amber-300 transition font-semibold"
                >
                    Sign Up
                </a>

            </p>

        </div>

    </div>

    <!-- SCRIPT -->
    

</body>
</html>
